name: Build and Publish Base Image

on:
  workflow_dispatch: # Allows manual triggering
  push:
    paths:
      - 'docker-build/Dockerfile.base' # Triggers on changes to the base Dockerfile

jobs:
  build-and-push-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker-build/Dockerfile.base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-server:base
          # Enable caching to speed up subsequent builds of the base image itself
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-server:base-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-server:base-cache,mode=max
